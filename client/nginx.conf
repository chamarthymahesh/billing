server {
    listen 80;

    # Proxy all /api/ requests to the Node.js backend
    # This eliminates CORS entirely — browser sees same origin
    location /api/ {
        proxy_pass http://server:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve static files from the root directory
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # This is crucial for React Router:
        # If a requested file/folder doesn't exist, fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # Optional: configure caching for static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
